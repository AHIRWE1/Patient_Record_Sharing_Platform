{% extends "base.html" %}

{% block title %}Register Hospital - MediShare{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0 mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <i class="bi bi-hospital display-1 text-primary"></i>
                    <h2 class="fw-bold text-primary mt-3">Register Hospital</h2>
                    <p class="lead text-muted">Create your hospital account to start sharing patient records</p>
                </div>
                
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="hospital_name" class="form-label">Hospital Name *</label>
                            <input type="text" class="form-control form-control-lg" id="hospital_name" name="hospital_name" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="username" class="form-label">Admin Username *</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Admin Password *</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold btn-lg">
                        <i class="bi bi-check-circle me-2"></i>Create Hospital Account
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0">Already registered? <a href="{{ url_for('auth.login') }}" class="text-primary fw-bold">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
