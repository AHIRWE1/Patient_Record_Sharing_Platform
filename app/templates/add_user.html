{% extends "base.html" %}

{% block title %}Add User - MediShare{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-3 mb-4 border-bottom">
    <h1 class="h2">
        <i class="bi bi-person-plus me-2"></i>Add Hospital User
    </h1>
    <a href="{{ url_for('hospitals.manage_users') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back to Users
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <form method="POST">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold">Username *</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Password *</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required minlength="6">
                    </div>
                    <div class="mb-5">
                        <label for="role" class="form-label fw-bold">Role *</label>
                        <select class="form-select form-select-lg" id="role" name="role" required>
                            <option value="">Select Role</option>
                            <option value="staff">Hospital Staff</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-end">
                        <button type="submit" class="btn btn-primary btn-lg px-5">
                            <i class="bi bi-check-circle me-2"></i>Create User
                        </button>
                        <a href="{{ url_for('hospitals.manage_users') }}" class="btn btn-outline-secondary px-5">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
