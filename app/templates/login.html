{% extends "base.html" %}

{% block title %}Login - MediShare{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-4 px-3">
    <div class="w-100" style="max-width: 420px;">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <i class="bi bi-heart-pulse display-2 text-primary"></i>
                    <h2 class="fw-bold text-primary mt-2">MediShare Rwanda</h2>
                    <p class="text-muted small">Integrated Patient Record Sharing Platform</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control form-control-lg" id="username"
                                   name="username" placeholder="Enter your username" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control form-control-lg" id="password"
                                   name="password" placeholder="Enter your password" required autocomplete="current-password">
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                                    tabindex="-1" title="Show/hide password">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-0 text-muted">New hospital?
                        <a href="{{ url_for('auth.register_hospital') }}" class="text-primary fw-bold">Register here</a>
                    </p>
                </div>
            </div>
        </div>

        <p class="text-center text-muted small mt-3">
            <i class="bi bi-shield-lock me-1"></i>Secure healthcare data platform &mdash; Rwanda
        </p>
    </div>
</div>

{% block scripts %}
<script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    togglePassword.addEventListener('click', function() {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        toggleIcon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    });
</script>
{% endblock %}
{% endblock %}
